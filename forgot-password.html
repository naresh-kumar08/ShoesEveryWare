<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ShoesEveryWhere</title>
  <link rel="shortcut icon" href="./assets/icon_ico.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-title"><a href="/index.html">ShoesEveryWhere</a></div>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <nav class="nav" id="nav-links">
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a id="link-login" href="/login.html" class="active">Login</a>
        <a id="link-register" href="/register.html">Register</a>
        <a id="link-logout" href="#" class="hidden">Logout</a>
        <a href="/cart.html">Cart</a>
        <a href="/orders.html">My Orders</a>
        <a id="link-admin" href="/admin.html" class="hidden">Admin</a>
      </nav>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Email dalo, OTP lo, aur naya password set karo.</p>

      <div id="reset-error" class="notice notice-error hidden" style="margin-bottom:16px;"></div>

      <form id="request-otp-form" class="form">
        <div>
          <div class="label">Email Address</div>
          <input id="reset-email" class="field" type="email" placeholder="you@example.com" required />
        </div>
        <button class="btn btn-primary" type="submit">Send OTP</button>
      </form>

      <form id="reset-password-form" class="form" style="margin-top:16px;">
        <div>
          <div class="label">OTP</div>
          <input id="reset-otp" class="field" type="text" placeholder="6 digit OTP" required />
        </div>
        <div>
          <div class="label">New Password</div>
          <input id="reset-new-password" class="field" type="password" placeholder="New password" required />
        </div>
        <div>
          <div class="label">Confirm Password</div>
          <input id="reset-confirm-password" class="field" type="password" placeholder="Confirm password" required />
        </div>
        <button class="btn btn-primary" type="submit">Reset Password</button>
      </form>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const nav = document.getElementById('nav-links');
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
  </script>
  <script type="module" src="/js/ui-init.js"></script>
  <script type="module" src="/js/forgot-password.js"></script>
</body>
</html>
