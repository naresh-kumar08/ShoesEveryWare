<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart — ShoesEveryWhere</title>
  <link rel="shortcut icon" href="./assets/icon_ico.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-title"><a href="/index.html">ShoesEveryWhere</a></div>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <nav class="nav" id="nav-links">
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a id="link-login" href="/login.html">Login</a>
        <a id="link-register" href="/register.html">Register</a>
        <a href="/cart.html" class="active">Cart</a>
        <a href="/orders.html">My Orders</a>
        <a id="link-logout" href="#" class="hidden">Logout</a>
        <a id="link-admin" href="/admin.html" class="hidden">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top:36px;padding-bottom:60px;">
    <p style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dark);font-weight:700;margin-bottom:8px;">Review & checkout</p>
    <h1 class="page-title">Shopping Cart</h1>
    <p class="page-subtitle">Items you've added — ready to check out.</p>

    <div id="cart-notice" class="notice hidden" style="margin-bottom:16px;"></div>
    <div id="cart-items"></div>

    <div class="cart-total-bar">
      <div>
        <div class="cart-total-label">Total Amount</div>
        <div class="cart-total-amount" id="cart-total">₹0</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" type="button" onclick="window.location.href='/index.html'">← Continue Shopping</button>
        <button id="proceed-btn" class="btn btn-primary" type="button">Proceed to Purchase</button>
      </div>
    </div>
  </main>

  <!-- Checkout Modal -->
  <div id="checkout-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2>Place Your Order</h2>
      <div style="margin-bottom:16px;">
        <div class="label">Delivery Address</div>
        <textarea id="checkout-address" class="field" rows="3" placeholder="Enter your full delivery address…"></textarea>
      </div>
      <div class="notice" style="margin-bottom:4px;">
        Payment: <strong>Cash on Delivery (COD)</strong>
      </div>
      <div class="modal-actions">
        <button id="checkout-cancel" class="btn" type="button">Cancel</button>
        <button id="checkout-place" class="btn btn-primary" type="button">Place Order</button>
      </div>
    </div>
  </div>

  <div class="footer-note">© 2025 ShoesEveryWhere · Premium Footwear</div>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const nav = document.getElementById('nav-links');
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
  </script>
  <script type="module" src="/js/cart.js"></script>
  <script type="module" src="/js/ui-init.js"></script>
</body>
</html>
