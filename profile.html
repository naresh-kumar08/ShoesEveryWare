<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — ShoesEveryWhere</title>
  <link rel="shortcut icon" href="./assets/icon_ico.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-title"><a href="/index.html">ShoesEveryWhere</a></div>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <nav class="nav" id="nav-links">
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a id="link-login" href="/login.html">Login</a>
        <a id="link-register" href="/register.html">Register</a>
        <a href="/cart.html">Cart</a>
        <a href="/orders.html">My Orders</a>
        <a id="link-logout" href="#" class="hidden">Logout</a>
        <a id="link-admin" href="/admin.html" class="hidden">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container" style="padding-top:36px;padding-bottom:60px;">
    <p style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dark);font-weight:700;margin-bottom:8px;">Account</p>
    <h1 class="page-title">My Profile</h1>
    <p class="page-subtitle">Your account details and cart summary.</p>

    <!-- Profile info -->
    <div class="profile-info-card">
      <div>
        <div class="profile-avatar" id="profile-avatar">?</div>
      </div>
      <div style="flex:1;">
        <div style="font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:4px;" id="profile-name"></div>
        <div style="color:var(--text-muted);font-size:14px;margin-bottom:2px;" id="profile-email"></div>
        <div style="color:var(--text-faint);font-size:13px;" id="profile-mobile"></div>
      </div>
    </div>

    <!-- Cart summary -->
    <div class="section-label">Cart Items</div>
    <div id="profile-cart-items" style="display:flex;flex-direction:column;gap:10px;"></div>

    <div class="cart-total-bar">
      <div>
        <div class="cart-total-label">Cart Total</div>
        <div class="cart-total-amount" id="profile-cart-total">₹0</div>
      </div>
      <button class="btn btn-primary" id="profile-proceed" type="button">Proceed to Purchase</button>
    </div>
  </main>

  <!-- Checkout Modal -->
  <div id="checkout-modal" class="modal-backdrop hidden">
    <div class="modal">
      <h2>Place Your Order</h2>
      <div style="margin-bottom:16px;">
        <div class="label">Delivery Address</div>
        <textarea id="checkout-address" class="field" rows="3" placeholder="Enter your full delivery address…"></textarea>
      </div>
      <div class="notice" style="margin-bottom:4px;">
        Payment: <strong>Cash on Delivery (COD)</strong>
      </div>
      <div class="modal-actions">
        <button id="checkout-cancel" class="btn" type="button">Cancel</button>
        <button id="checkout-place" class="btn btn-primary" type="button">Place Order</button>
      </div>
    </div>
  </div>

  <div class="footer-note">© 2025 ShoesEveryWhere · Premium Footwear</div>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const nav = document.getElementById('nav-links');
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
  </script>
  <script type="module" src="/js/profile.js"></script>
  <script type="module" src="/js/ui-init.js"></script>
</body>
</html>
