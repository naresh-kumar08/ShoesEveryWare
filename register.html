<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — ShoesEveryWhere</title>
  <link rel="shortcut icon" href="./assets/icon_ico.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-title"><a href="/index.html">ShoesEveryWhere</a></div>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <nav class="nav" id="nav-links">
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a id="link-login" href="/login.html">Login</a>
        <a id="link-register" href="/register.html" class="active">Register</a>
        <a href="/cart.html">Cart</a>
        <a href="/orders.html">My Orders</a>
        <a id="link-logout" href="#" class="hidden">Logout</a>
        <a id="link-admin" href="/admin.html" class="hidden">Admin</a>
      </nav>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <p style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dark);font-weight:700;margin-bottom:10px;">New here?</p>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join ShoesEveryWhere for exclusive deals and fast delivery.</p>

      <div id="register-error" class="notice notice-error hidden" style="margin-bottom:16px;"></div>

      <form id="register-form" class="form">
        <div>
          <div class="label">Full Name</div>
          <input id="reg-name" class="field" type="text" placeholder="Your full name" required />
        </div>
        <div>
          <div class="label">Mobile Number</div>
          <input id="reg-mobile" class="field" type="tel" placeholder="+91 98765 43210" required />
        </div>
        <div>
          <div class="label">Email Address</div>
          <input id="reg-email" class="field" type="email" placeholder="you@example.com" required />
        </div>
        <div>
          <div class="label">Password</div>
          <input id="reg-password" class="field" type="password" placeholder="Create a strong password" required />
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;padding:13px;">Create Account</button>
      </form>

      <div style="margin-top:20px;text-align:center;">
        <p style="color:var(--text-faint);font-size:13.5px;">
          Already have an account? <a href="/login.html" style="color:var(--gold);">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const nav = document.getElementById('nav-links');
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
  </script>
  <script type="module" src="/js/ui-init.js"></script>
  <script type="module" src="/js/register.js"></script>
</body>
</html>
