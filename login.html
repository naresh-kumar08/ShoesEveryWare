<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ShoesEveryWhere</title>
  <link rel="shortcut icon" href="./assets/icon_ico.ico" type="image/x-icon">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <div class="logo"></div>
        <div class="brand-title"><a href="/index.html">ShoesEveryWhere</a></div>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">&#9776;</button>
      <nav class="nav" id="nav-links">
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a id="link-login" href="/login.html" class="active">Login</a>
        <a id="link-register" href="/register.html">Register</a>
        <a id="link-logout" href="#" class="hidden">Logout</a>
        <a href="/cart.html">Cart</a>
        <a href="/orders.html">My Orders</a>
        <a id="link-admin" href="/admin.html" class="hidden">Admin</a>
      </nav>
    </div>
  </header>

  <div class="auth-wrap">
    <div class="auth-card">
      <p style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold-dark);font-weight:700;margin-bottom:10px;">Welcome back</p>
      <h1 class="auth-title">Sign In</h1>
      <p class="auth-subtitle">Access your account to manage orders and cart.</p>

      <div id="login-error" class="notice notice-error hidden" style="margin-bottom:16px;"></div>

      <form id="login-form" class="form">
        <div>
          <div class="label">Email Address</div>
          <input id="login-email" class="field" type="email" placeholder="you@example.com" required />
        </div>
        <div>
          <div class="label">Password</div>
          <input id="login-password" class="field" type="password" placeholder="••••••••" required />
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;padding:13px;">Sign In</button>
      </form>
      <div style="margin-top:10px;">
        <a href="/forgot-password.html" style="color:var(--gold);font-size:13px;">Forgot Password?</a>
      </div>

      <div style="margin-top:20px;text-align:center;">
        <p style="color:var(--text-faint);font-size:13.5px;">
          Don't have an account? <a href="/register.html" style="color:var(--gold);">Create one</a>
        </p>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
          
      </div>
    </div>
  </div>

  <script>
    const toggle = document.getElementById('nav-toggle');
    const nav = document.getElementById('nav-links');
    toggle.addEventListener('click', () => nav.classList.toggle('open'));
  </script>
  <script type="module" src="/js/ui-init.js"></script>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
